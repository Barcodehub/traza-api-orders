trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'payment-service/*'

variables:
  dockerRegistryServiceConnection: 'acr-connection'
  imageRepository: 'payment-service'
  containerRegistry: 'acrbankprodmgtprod.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/payment-service/Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and Push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Gradle@3
      displayName: 'Build with Gradle'
      inputs:
        gradleWrapperFile: 'payment-service/gradlew'
        workingDirectory: 'payment-service'
        tasks: 'build'
        publishJUnitResults: true
        testResultsFiles: '**/TEST-*.xml'
        sonarQubeRunAnalysis: true

    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: Deploy
    displayName: Deploy
    environment: 'production'
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: KubernetesManifest@1
            displayName: Deploy to Kubernetes cluster
            inputs:
              action: deploy
              connectionType: azureResourceManager
              azureSubscriptionConnection: 'aks-connection'
              azureResourceGroup: 'rg-bankprodmgt-prod'
              kubernetesCluster: 'aks-bankprodmgt-prod'
              namespace: 'default'
              manifests: |
                $(Pipeline.Workspace)/s/k8s/payment-service/deployment.yaml
                $(Pipeline.Workspace)/s/k8s/payment-service/service.yaml
              imagePullSecrets: |
                $(imagePullSecret)
              containers: |
                $(containerRegistry)/$(imageRepository):$(tag)

