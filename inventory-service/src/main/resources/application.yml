server:
  port: 8083

spring:
  application:
    name: inventory-service

logging:
  level:
    org.barcodev: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0 # Sample 100% of requests for dev
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces # datadog OTLP endpoint
    metrics:
      export:
        url: http://localhost:4318/v1/metrics
        step: 10s
