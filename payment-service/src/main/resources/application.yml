server:
  port: 8082

spring:
  application:
    name: payment-service

logging:
  level:
    org.barcodev: INFO

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0 # Sample 100% of requests for dev
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces # Jaeger OTLP endpoint
